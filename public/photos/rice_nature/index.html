<script>

document.addEventListener("DOMContentLoaded", function() {
  const article = document.querySelector('article');
  if (article) {
    article.innerHTML = article.innerHTML.replace(
      /\[\[(.*?)\]\]/g,
      function(match, text) {
        const slug = text.trim().toLowerCase().replace(/\s+/g, '-');
        return `<a href="/posts/${slug}" class="wikilink">${text}</a>`;
      }
    );
  }

  
  const burger = document.getElementById('burger-toggle');
  const menu = document.getElementById('mobile-menu');

  burger.addEventListener('click', () => {
    const expanded = burger.getAttribute('aria-expanded') === 'true';
    burger.setAttribute('aria-expanded', String(!expanded));
    menu.setAttribute('aria-hidden', String(expanded));
    menu.classList.toggle('is-open');
  });

  menu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      burger.setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
      menu.classList.remove('is-open');
    });
  });
});


const toggleBtn = document.getElementById('theme-toggle');
const toggleBtnMobile = document.getElementById('theme-toggle-mobile');
const htmlTag = document.documentElement;

function setThemeLabel(isDark) {
  const label = isDark ? "Light?" : "Dark?";
  toggleBtn.innerText = label;
  toggleBtnMobile.innerText = label;
}

function applyTheme(isDark) {
  htmlTag.classList.toggle('dark-mode', isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  setThemeLabel(isDark);
}

setThemeLabel(htmlTag.classList.contains('dark-mode'));

toggleBtn.addEventListener('click', () => applyTheme(!htmlTag.classList.contains('dark-mode')));
toggleBtnMobile.addEventListener('click', () => applyTheme(!htmlTag.classList.contains('dark-mode')));
</script>
