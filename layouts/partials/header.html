<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Title }} | {{ .Site.Title }}</title>
<link rel="stylesheet" href="{{ "css/hankel.css" | relURL }}" />
<link rel="stylesheet" href="{{ "css/fonts.css" | relURL }}" />
{{ partial "head_custom.html" . }}
</head>
<body>
<nav class="nav-x">
  <div class="nav-links">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}">
      <span class="nav-text-full">{{ .Name }}{{ .Params.icon }}</span>
      <span class="nav-text-short">{{ .Params.icon }}</span>
    </a>
    {{ end }}
  </div>

  <div class="nav-toggle">
    <button id="theme-toggle" aria-label="Toggle light/dark mode">🌓</button>
    <button id="burger-toggle" class="burger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobile-menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<div id="mobile-menu" class="mobile-menu" aria-hidden="true">
  {{ range .Site.Menus.main }}
  <a href="{{ .URL | relURL }}" class="mobile-menu-link">
    {{ .Name }}{{ .Params.icon }}
  </a>
  {{ end }}
</div>
