<!DOCTYPE html>
<html lang="en"> <head>
<meta name="google-site-verification" content="OA7xUcI_lajVaUMI6oPygbMosk8zq5AQHFRHE83N48Y" />
<script>
const currentTheme = localStorage.getItem('theme');
if (currentTheme === 'dark') {
  document.documentElement.classList.add('dark-mode');
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}  {{ .Site.Title }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/hankel.css" | relURL }}">
{{ with .Site.Params.favicon }}
<link rel="icon" href="{{ . | relURL }}" type="image/x-icon">
{{ end }}
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<div class="container-x">
<nav class="nav-x">
  <div class="nav-links">
    {{ range .Site.Menus.main.ByWeight }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </div>
  <div class="nav-right">
    <button id="theme-toggle" aria-label="Toggle Dark Mode">Theme</button>
  </div>
</nav>

<main>
  {{ block "main" . }}{{ end }}
</main>
<footer style="margin-top: 2rem;">
  <center>
    &copy; {{ now.Year }} {{ .Site.Params.authorName }}. Photos licensed CC-BY-SA 3.0.
  </center>
</footer>
</div>


<script>
  // for wikilinks
  document.addEventListener("DOMContentLoaded", function() {
    const article = document.querySelector('article');
    if (article) {
      article.innerHTML = article.innerHTML.replace(
        /\[\[(.*?)\]\]/g,
        function(match, text) {
          // split at | to be able to add a differeent title
          const parts = text.split('|');
          const label = parts[0].trim();
          const target = (parts[1] || parts[0]).trim();
          const slug = target.toLowerCase().replace(/\s+/g, '-');
          return '<a href="/zettelkasten/' + slug + '" class="wikilink">' + label + '</a>';
        }
      );
    }
  });

  const toggleBtn = document.getElementById('theme-toggle');
  const htmlTag = document.documentElement;

  function setThemeLabel(isDark) {
    const label = isDark ? "Light?" : "Dark?";
    toggleBtn.innerText = label;
  }

  function applyTheme(isDark) {
    htmlTag.classList.toggle('dark-mode', isDark);
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    setThemeLabel(isDark);
  }

  setThemeLabel(htmlTag.classList.contains('dark-mode'));

  toggleBtn.addEventListener('click', () => applyTheme(!htmlTag.classList.contains('dark-mode')));
</script>
</body>
</html>
