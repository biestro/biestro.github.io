<!DOCTYPE html>
<html lang="en">
<head>



<meta name="google-site-verification" content="OA7xUcI_lajVaUMI6oPygbMosk8zq5AQHFRHE83N48Y" />

<script>
    // 1. Critical Blocking Script: Run this IMMEDIATELY to prevent flashing
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
      }
    })();
</script>

<script>
const currentTheme = localStorage.getItem('theme');
if (currentTheme === 'dark') {
  document.documentElement.classList.add('dark-mode');
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}  {{ .Site.Title }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/hankel.css" | relURL }}">
{{ with .Site.Params.favicon }}
<link rel="icon" href="{{ . | relURL }}" type="image/x-icon">
{{ end }}
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<div class="container-x">
<nav class="nav-x">
  <div class="nav-links">
    {{ range .Site.Menus.main.ByWeight }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </div>
  <div class="nav-right">
    <button id="theme-toggle" aria-label="Toggle Dark Mode">Theme</button>
  </div>
</nav>

<main>
  {{ block "main" . }}{{ end }}
</main>
<footer style="margin-top: 2rem;">
  <center>
    &copy; {{ now.Year }} {{ .Site.Params.authorName }}. Photos licensed CC-BY-SA 3.0.
  </center>
</footer>
</div>



<script>
  // 2. Non-blocking Script: Handle the button logic after DOM loads
  document.addEventListener("DOMContentLoaded", function() {
    const toggleBtn = document.getElementById('theme-toggle');
    const htmlTag = document.documentElement;

    if (!toggleBtn) return;

    function updateButtonLabel() {
      const isDark = htmlTag.classList.contains('dark-mode');
      toggleBtn.innerText = isDark ? "Light?" : "Dark?";
    }

    // Initialize button text based on the class set in the <head>
    updateButtonLabel();

    toggleBtn.addEventListener('click', () => {
      const turnDark = !htmlTag.classList.contains('dark-mode');
      htmlTag.classList.toggle('dark-mode', turnDark);
      localStorage.setItem('theme', turnDark ? 'dark' : 'light');
      updateButtonLabel();
    });
  });
</script>
</body>
</html>
