baseURL = 'https://biestro.github.io/'
languageCode = 'en-us'
title = 'Alberto Ruiz Biestro'


[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.renderer]
      unsafe = true # Needed for inline HTML/MathJax
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4


  [markup.highlight]
    style = "friendly"  # Choose a light theme
    guessSyntax = true

